# News Harness V1 - Hostinger Docker Manager compose URL
#
# Paste the raw URL for this file into Hostinger's Docker Compose URL field.

services:
  app:
    build:
      context: https://github.com/yansc153/news_harness.git
      dockerfile: Dockerfile
    restart: unless-stopped
    # ponytail: Caddy owns 80/443 for TLS; app stays on localhost port 8765.
    network_mode: host
    volumes:
      - news_harness_artifacts:/app/artifacts
      - news_harness_feed:/app/data/radar-timeline
      - /run/news-harness/secrets:/run/news-harness/secrets:ro
    environment:
      - PYTHONUNBUFFERED=1
      - NEWS_HARNESS_SITE_PORT=8765
      - NEWS_HARNESS_FEED_PATH=/app/data/radar-timeline/timeline_feed.json
      - NEWS_HARNESS_CYCLE_MODE=manual-smoke
      - NEWS_HARNESS_CYCLE_BACKEND=direct-cli
      - NEWS_HARNESS_MANUAL_SMOKE_ACK=1
      - NEWS_HARNESS_REAL_SOURCE_SMOKE=1
      - NEWS_HARNESS_DEEPSEEK_SMOKE=1
      - NEWS_HARNESS_X_HEADLESS=1
      - NEWS_HARNESS_XUEQIU_HEADLESS=1
      - NEWS_HARNESS_XUEQIU_STORAGE_STATE_FILE=/run/news-harness/secrets/xueqiu-storage-state.json
      - NEWS_HARNESS_X_COOKIE_FILE=/run/news-harness/secrets/x-list-reader-cookie
      - NEWS_HARNESS_REDDIT_COOKIE_FILE=/run/news-harness/secrets/reddit-reader-cookie
      - NEWS_HARNESS_EXPORT_TOKEN_FILE=/run/news-harness/secrets/export-token
      - DEEPSEEK_API_KEY_FILE=/run/news-harness/secrets/deepseek-api-key
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8765/api/health')"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 10m

  caddy:
    build:
      context: https://github.com/yansc153/news_harness.git
      dockerfile: docker/Dockerfile.caddy
    restart: unless-stopped
    network_mode: host
    volumes:
      - news_harness_caddy_data:/data
      - news_harness_caddy_config:/config
    environment:
      - NEWS_HARNESS_DOMAIN=newshardness.hellopepper.work
      - NEWS_HARNESS_UPSTREAM=127.0.0.1:8765
    depends_on:
      - app

volumes:
  news_harness_artifacts:
  news_harness_feed:
  news_harness_caddy_data:
  news_harness_caddy_config:
